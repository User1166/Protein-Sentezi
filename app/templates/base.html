<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Protein Sentezi Eğitimi{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-icon">🧬</span>
                <span class="logo-text">Protein Sentezi</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Ana Sayfa</a>
                <a href="/learn" class="nav-link">Öğren</a>
                <a href="/games" class="nav-link">Oyunlar</a>
                <a href="/quiz" class="nav-link">Quiz</a>
                <a href="/leaderboard" class="nav-link">Sıralamalar</a>
            </div>
            <div class="user-info">
                <span class="score-display" id="score-display">Puan: 0</span>
                <button class="user-btn" onclick="toggleUserMenu()">👤 <span id="playerNameDisplay">Profil</span></button>
                <div id="user-menu" class="user-menu">
                    <div class="user-profile-section">
                        <strong id="userNameDisplay">Adınız:</strong><br>
                        <input type="text" id="nameInput" placeholder="Adınızı girin..." style="width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px;" maxlength="15">
                        <button onclick="savePlayerName()" style="width: 100%; padding: 8px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.3s;">Kaydet</button>
                    </div>
                    <hr style="margin: 10px 0; border: none; border-top: 1px solid #eee;">
                    <a href="/" onclick="resetGame()">Yeni Oyun</a>
                    <a href="/about">Hakkında</a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 Protein Sentezi Eğitim Platformu - Lise Biyolojisi Dersi</p>
        <p>Öğrenen: Yaparak Öğren | Oyunlar ile Eğlen | Bilim Kur</p>
    </footer>

    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script>
        // Sayfa yüklendiğinde adı ve puanı yükle
        window.addEventListener('load', async function() {
            // Kullanıcı başlat - API'den puanı al
            await initUser();
            
            // Oyuncu bilgilerini ve leaderboard puanını yükle
            loadPlayerName();
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>

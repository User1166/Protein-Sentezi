{% extends "base.html" %}

{% block title %}Quiz - Protein Sentezi{% endblock %}

{% block content %}
<div class="quiz-section">
    <div class="container">
        <h1>Protein Sentezi Quizi</h1>
        <p class="lead">Bilgini sınayarak puan kazanır ve başarı elde et!</p>

        <div class="quiz-controls">
            <select id="topic-filter" onchange="loadQuizzes()">
                <option value="">Tüm Konular</option>
                <option value="DNA">DNA</option>
                <option value="RNA">RNA / Transkripsiyoni</option>
                <option value="mRNA">mRNA ve Kodonlar</option>
                <option value="Translation">Translasyon</option>
                <option value="Protein">Protein Yapısı</option>
            </select>
            
            <select id="difficulty-filter" onchange="loadQuizzes()">
                <option value="">Tüm Zorluk Seviyeleri</option>
                <option value="1">Kolay (1)</option>
                <option value="2">Orta (2)</option>
                <option value="3">Zor (3)</option>
            </select>
        </div>

        <div id="quiz-container" class="quiz-container">
            <!-- Quizler dinamik olarak yüklenecek -->
        </div>

        <div id="quiz-progress" class="quiz-progress" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span id="quiz-count">0 / 0</span>
        </div>
    </div>
</div>

<!-- Quiz Modal -->
<div id="quiz-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="quiz-question">Soru yükleniyor...</h2>
            <button class="close-btn" id="close-quiz-btn">×</button>
        </div>
        <div class="modal-body">
            <div id="quiz-options" class="quiz-options">
                <!-- Seçenekler yüklenecek -->
            </div>
            <div id="quiz-feedback" class="quiz-feedback" style="display: none;">
                <p id="feedback-text"></p>
                <button class="btn btn-primary" id="next-quiz-btn">Sonraki Soru</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>

// Örnek Quiz Soruları (localStorage'de tutulacak)
const SAMPLE_QUIZZES = [
    {
        id: 1,
        question: "DNA'daki timin (T) bazına karşılık gelen RNA bazı hangisidir?",
        options: ["Timin", "Urasil", "Adenin", "Sitozin"],
        correct_answer: "Urasil",
        explanation: "RNA'da timin yerine urasil (U) kullanılır. DNA: A-T, C-G | RNA: A-U, C-G",
        topic: "DNA",
        difficulty: 1,
        points: 10
    },
    {
        id: 2,
        question: "Transkripsiyon nedir?",
        options: ["mRNA'nın proteine dönüştürülmesi", "DNA'nın mRNA'ya kopyalanması", "Proteinlerin katlanması", "Ribozomun oluşturulması"],
        correct_answer: "DNA'nın mRNA'ya kopyalanması",
        explanation: "Transkripsiyon, DNA şeridinin mRNA'ya kopyalanarak aktarılmasıdır. Bu işlem çekirdekte gerçekleşir.",
        topic: "RNA / Transkripsiyon",
        difficulty: 1,
        points: 10
    },
    {
        id: 3,
        question: "Kodon nedir?",
        options: ["3 amino asit", "3 nükleotid", "1 amino asit", "mRNA sonu"],
        correct_answer: "3 nükleotid",
        explanation: "Kodon, mRNA'daki 3 nükleotitten oluşan bir birim olup, bir amino asiti kodlar.",
        topic: "mRNA ve Kodonlar",
        difficulty: 1,
        points: 10
    },
    {
        id: 4,
        question: "Translasyon hangi organelde gerçekleşir?",
        options: ["Çekirdek", "Ribozom", "Mitokondri", "Endoplazmatik retikulum"],
        correct_answer: "Ribozom",
        explanation: "Translasyon ribozomda gerçekleşir. mRNA ile tRNA'nın mRNA kodlarını okuyup proteine çevirdiği yer ribozomdur.",
        topic: "Translasyon",
        difficulty: 2,
        points: 15
    },
    {
        id: 5,
        question: "Proteinlerin temel yapı taşları nedir?",
        options: ["Nükleotidler", "Amino asitler", "Şekerler", "Yağ asitleri"],
        correct_answer: "Amino asitler",
        explanation: "Proteinler 20 çeşit amino asidin belirli sırada bağlanmasıyla oluşur.",
        topic: "Protein Yapısı",
        difficulty: 1,
        points: 10
    },
    {
        id: 6,
        question: "Stop kodon hangi işlevi yerine getirir?",
        options: ["Yeni protein başlatır", "Protein sentezini durdurur", "Ribozoma bağlanır", "mRNA'yı koparır"],
        correct_answer: "Protein sentezini durdurur",
        explanation: "Stop kodonlar (UAA, UAG, UGA) protein sentezinin sonlandırılmasını sağlar.",
        topic: "mRNA ve Kodonlar",
        difficulty: 2,
        points: 15
    },
    {
        id: 7,
        question: "Hemoglobin hangi taşıyıcı proteindir?",
        options: ["Aminoasitleri taşır", "Oksijeni taşır", "Enerjisi taşır", "Sinyal taşır"],
        correct_answer: "Oksijeni taşır",
        explanation: "Hemoglobin, kanda oksijeni soğuk kısımlara taşıyan metal içerir proteinidir.",
        topic: "Protein Yapısı",
        difficulty: 2,
        points: 15
    }
];

let currentQuizzes = [];
let currentQuizIndex = 0;
let userAnswers = [];
let userScore = 0;

async function loadQuizzes() {
    const topic = document.getElementById('topic-filter').value;
    const difficulty = document.getElementById('difficulty-filter').value;
    
    // Örnek sorulardan filtrele
    currentQuizzes = SAMPLE_QUIZZES.filter(q => {
        if (topic && q.topic !== topic) return false;
        if (difficulty && q.difficulty !== parseInt(difficulty)) return false;
        return true;
    });
    
    currentQuizIndex = 0;
    userAnswers = [];
    
    displayQuizzes();
}

function displayQuizzes() {
    const container = document.getElementById('quiz-container');
    
    if (currentQuizzes.length === 0) {
        container.innerHTML = '<p class="no-quizzes">Bu kategoride quiz bulunamadı.</p>';
        return;
    }
    
    const html = currentQuizzes.map((quiz, index) => `
        <div class="quiz-list-item" data-index="${index}">
            <div class="quiz-info">
                <h3>${escapeHtml(quiz.question)}</h3>
                <span class="quiz-meta">
                    <span class="topic">${escapeHtml(quiz.topic)}</span>
                    <span class="difficulty">Zorluk: ${quiz.difficulty}</span>
                    <span class="points">${quiz.points} puan</span>
                </span>
            </div>
            <div class="quiz-arrow">→</div>
        </div>
    `).join('');
    
    container.innerHTML = html;
    
    // Event listeners add
    document.querySelectorAll('.quiz-list-item').forEach(item => {
        item.addEventListener('click', function() {
            startQuiz(parseInt(this.dataset.index));
        });
    });
}

function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function startQuiz(index) {
    currentQuizIndex = index;
    const quiz = currentQuizzes[currentQuizIndex];
    
    document.getElementById('quiz-question').textContent = quiz.question;
    
    const optionsHtml = quiz.options.map((option, optionIndex) => `
        <button class="quiz-option" data-option="${optionIndex}">
            ${escapeHtml(option)}
        </button>
    `).join('');
    
    document.getElementById('quiz-options').innerHTML = optionsHtml;
    document.getElementById('quiz-feedback').style.display = 'none';
    document.getElementById('quiz-modal').style.display = 'flex';
    
    // Event listeners add to options
    document.querySelectorAll('.quiz-option').forEach((btn, idx) => {
        btn.addEventListener('click', function() {
            selectAnswer(this, quiz.options[idx]);
        });
    });
}

async function selectAnswer(button, answer) {
    const quiz = currentQuizzes[currentQuizIndex];
    // Tüm butonları devre dışı bırak
    document.querySelectorAll('.quiz-option').forEach(btn => btn.disabled = true);
    const isCorrect = answer.trim().toLowerCase() === quiz.correct_answer.trim().toLowerCase();

    // Doğru/yanlış butonları vurgula (hızlı geri bildirim için)
    document.querySelectorAll('.quiz-option').forEach(btn => {
        if (btn.textContent.trim().toLowerCase() === quiz.correct_answer.trim().toLowerCase()) {
            btn.classList.add('correct');
        } else if (btn.textContent.trim().toLowerCase() === answer.trim().toLowerCase() && !isCorrect) {
            btn.classList.add('wrong');
        }
    });

    // Geri bildirim alanı
    const feedbackDiv = document.getElementById('quiz-feedback');
    const feedbackText = document.getElementById('feedback-text');

    // Sunucuya cevabı gönder ve sunucudan dönen puanı kullan
    try {
        const resp = await fetch('/api/quiz/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ quiz_id: quiz.id, answer: answer })
        });
        const data = await resp.json();

        if (data.success) {
            if (data.correct) {
                feedbackText.innerHTML = `<strong style="color: #4CAF50;">✓ Doğru!</strong> +${data.points_earned} puan<br>${quiz.explanation}`;
            } else {
                feedbackText.innerHTML = `<strong style="color: #f44336;">✗ Yanlış!</strong><br>Doğru cevap: <strong>${quiz.correct_answer}</strong><br>${quiz.explanation}`;
            }

            // Sunucudaki toplam puanı göster ve leaderboard'a kaydet
            const total = data.total_score;
            userScore = parseInt(total) || 0;
            document.getElementById('score-display').textContent = `Puan: ${userScore}`;
            localStorage.setItem('quizScore', userScore);
            const playerName = localStorage.getItem('playerName') || 'Oyuncu';
            updateLeaderboard(playerName, userScore);
        } else {
            feedbackText.textContent = 'Cevap gönderilirken hata oluştu.';
        }
    } catch (err) {
        console.error('Quiz submit hata:', err);
        feedbackText.textContent = 'Sunucuya ulaşılamadı. Puan kaydedilemedi.';
    }

    feedbackDiv.style.display = 'block';
}

function nextQuiz() {
    closeQuizModal();
    displayQuizzes();
}

function closeQuizModal() {
    document.getElementById('quiz-modal').style.display = 'none';
}

async function updateScore(newScore) {
    document.getElementById('score-display').textContent = `Puan: ${newScore}`;
    // localStorage'ye de kaydet
    localStorage.setItem('quizScore', newScore);
    
    // Leaderboard'a güncellemesi yap
    const playerName = localStorage.getItem('playerName') || 'Oyuncu';
    updateLeaderboard(playerName, newScore);
}

// Sayfayı yükle
document.addEventListener('DOMContentLoaded', async function() {
    // Quiz puanını yükle
    const savedScore = localStorage.getItem('quizScore');
    if (savedScore) {
        userScore = parseInt(savedScore);
        document.getElementById('score-display').textContent = `Puan: ${userScore}`;
    }
    
    // Close button listener
    const closeBtn = document.getElementById('close-quiz-btn');
    if (closeBtn) {
        closeBtn.addEventListener('click', closeQuizModal);
    }
    
    // Next button listener
    const nextBtn = document.getElementById('next-quiz-btn');
    if (nextBtn) {
        nextBtn.addEventListener('click', nextQuiz);
    }
    
    loadQuizzes();
});
</script>
{% endblock %}
